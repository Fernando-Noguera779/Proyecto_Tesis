<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNOGUERA CLUSTER - Restablecer Contraseña</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo-FNC.png') }}">
    <style>
        body {
            background: linear-gradient(rgba(26, 54, 104, 0.85), rgba(26, 54, 104, 0.85)),
            url("{{ url_for('static', filename='img/una_logo.png') }}");
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            max-width: 450px;
            width: 90%;
        }
    </style>
</head>
<body>
    <div class="login-card card glass p-4">
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='img/logo-FNC.png') }}" alt="Logo" width="70">
            <h4 class="text-white mt-3">Restablecer Contraseña</h4>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, msg in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('reset_password', token=token) }}">
            <div class="mb-3">
                <label class="form-label text-white-50">Nueva contraseña</label>
                <input type="password" name="password" class="form-control" minlength="6" required
                       placeholder="Mínimo 6 caracteres">
            </div>
            <div class="mb-3">
                <label class="form-label text-white-50">Confirmar contraseña</label>
                <input type="password" name="confirm_password" class="form-control" minlength="6" required
                       placeholder="Repite la contraseña">
            </div>
            <button type="submit" class="btn btn-primary w-100">Restablecer contraseña</button>
        </form>

        <div class="text-center mt-3">
            <a href="{{ url_for('login') }}" class="text-white-50 small">Volver al inicio de sesión</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

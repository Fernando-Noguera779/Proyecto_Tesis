<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNOGUERA CLUSTER - Recuperar Contraseña</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background: linear-gradient(rgba(26, 54, 104, 0.85), rgba(26, 54, 104, 0.85)),
            url("{{ url_for('static', filename='img/una_logo.png') }}");
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            max-width: 450px;
            width: 90%;
        }
    </style>
</head>

<body>
    <div class="login-card glass-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-gradient">Recuperar Acceso</h2>
            <p class="text-muted small">Ingrese su correo institucional para restablecer su contraseña.</p>
        </div>

        <form action="/recuperar_password" method="POST">
            <div class="mb-4">
                <label class="form-label fw-bold">Correo Electrónico</label>
                <input type="email" name="correo" class="form-control form-control-premium"
                    placeholder="usuario@fpuna.una.py" required>
            </div>

            <button type="submit" class="btn btn-premium w-100 py-3 mb-3">Enviar Enlace de Recuperación</button>
            
            <div class="text-center">
                <a href="/login" class="small text-decoration-none text-muted">
                    Volver al inicio de sesión
                </a>
            </div>
        </form>

        <div class="text-center mt-5">
            <p class="text-muted small">© 2026 Facultad Politécnica, UNA</p>
        </div>
    </div>
</body>

</html>
